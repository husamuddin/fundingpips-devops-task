name: Release

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  ECR_REGISTRY: ${{ vars.ECR_REGISTRY }}
  ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
  AWS_ROLE_ARN: ${{ vars.AWS_ROLE_ARN }}

jobs:
  build:
    name: Build Docker image
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.set-tag.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 1

      - name: Set image tag
        id: set-tag
        run: |
          echo "tag=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (load into daemon)
        uses: docker/build-push-action@v5
        with:
          context: ./api
          push: false
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ steps.set-tag.outputs.tag }}
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest
          load: true

      - name: Save Docker image to tar
        run: |
          docker save ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ steps.set-tag.outputs.tag }} \
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest -o image.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: image.tar

  scan:
    name: Scan Docker image
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Run Trivy vulnerability scan (Docker image)
        run: |
          docker load -i image.tar
          docker save -o vuln-image.tar ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ needs.build.outputs.image_tag }}

          set +e
          docker run --rm \
            -v "${PWD}:/work" \
            aquasec/trivy:0.69.1 image \
            --input /work/vuln-image.tar \
            --format table \
            --severity CRITICAL,HIGH \
            --ignore-unfixed \
            --no-progress \
            --quiet \
            --exit-code 1 \
            --output /work/trivy.txt
          trivy_exit=$?
          set -e

          if [[ $trivy_exit -eq 1 ]]; then
            echo "Trivy found CRITICAL/HIGH vulnerabilities."
          elif [[ $trivy_exit -ne 0 ]]; then
            echo "Trivy execution failed (exit code: $trivy_exit)."
          fi

          if [[ -f trivy.txt ]]; then
            echo "----- Trivy report (trivy.txt) -----"
            cat trivy.txt
            echo "-------------------------------------"
          fi

          exit $trivy_exit

      - name: Publish Trivy output to workflow summary
        if: always()
        run: |
          if [[ -s trivy.txt ]]; then
            {
              echo "### Security Output"
              echo "<details><summary>Click to expand</summary>"
              echo ""
              echo '```'
              cat trivy.txt
              echo '```'
              echo "</details>"
            } >> $GITHUB_STEP_SUMMARY
          elif [[ -f trivy.txt ]]; then
            {
              echo "### Security Output"
              echo "No CRITICAL/HIGH vulnerabilities found."
            } >> $GITHUB_STEP_SUMMARY
          else
            {
              echo "### Security Output"
              echo "Trivy report file was not generated."
            } >> $GITHUB_STEP_SUMMARY
          fi

  push:
    name: Push image to ECR
    runs-on: ubuntu-latest
    needs:
      - build
      - scan
    permissions:
      contents: read
      id-token: write
    steps:
      - name: configure aws credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHub_to_AWS_via_FederatedOIDC

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Load image
        run: |
          docker load -i image.tar

      - name: Push image tags
        run: |
          docker push ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ needs.build.outputs.image_tag }}
          docker push ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest
