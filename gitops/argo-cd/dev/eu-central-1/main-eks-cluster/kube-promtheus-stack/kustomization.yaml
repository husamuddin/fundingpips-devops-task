apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: kube-prometheus-stack
helmCharts:
  - name: kube-prometheus-stack
    includeCRDs: true
    releaseName: kube-prometheus-stack
    repo: https://prometheus-community.github.io/helm-charts
    version: 82.8.0
    valuesInline:
      prometheusOperator:
        enabled: true
      crds:
        enabled: true

resources:
  - ./namespace.yaml
