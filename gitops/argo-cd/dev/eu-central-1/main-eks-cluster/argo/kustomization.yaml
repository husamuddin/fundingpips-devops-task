apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: argo
helmCharts:
  - name: argo-cd
    releaseName: argo-cd
    repo: https://argoproj.github.io/argo-helm
    version: 9.4.6
    valuesInline:
      configs:
        cm:
          kustomize.buildOptions: "--enable-helm"

resources:
  - ./namespace.yaml
  - ./secrets.yaml
