apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: external-dns
helmCharts:
  - name: external-dns
    releaseName: external-dns
    repo: https://kubernetes-sigs.github.io/external-dns
    version: 1.20.0
    valuesInline:
      provider:
        name: cloudflare
      sources:
        - ingress
      env:
        - name: CF_API_TOKEN
          valueFrom:
            secretKeyRef:
              name: cloudflare-api-key
              key: apiKey

resources:
  - ./namespace.yaml
  - ./secrets.yaml
